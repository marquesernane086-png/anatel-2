    <!-- Interceptador: converte chamadas para FuriaPay - DEVE SER PRIMEIRO -->
    <script>
        // Interceptador inline para garantir que seja executado ANTES de tudo
        (function() {
            console.log('🔄 [Interceptador] Inicializando interceptador FuriaPay...');
            
            const PROXY_URL = window.location.origin; // Mesma origem (localhost:3001)
            
            // Interceptar fetch ANTES de qualquer outro script
            const originalFetch = window.fetch;
            window.fetch = function(url, options) {
                let urlString = typeof url === 'string' ? url : (url?.url || url?.href || String(url) || '');
                
                // Interceptar TODAS as chamadas relacionadas a PagLoop ou payments/deposit
                const isPagLoopCall = urlString.includes('api.pagloop.tech') || 
                                     urlString.includes('pagloop.tech') ||
                                     urlString.includes('/api/payments/deposit') ||
                                     urlString.toLowerCase().includes('pagloop');
                
                if (isPagLoopCall) {
                    console.log('🔄 [Interceptador Inline] BLOCANDO chamada PagLoop:', urlString);
                    
                    // FORÇAR conversão para FuriaPay via servidor local
                    const newUrl = `${PROXY_URL}/api/payments/deposit`;
                    
                    console.log('✅ [Interceptador Inline] Redirecionando para FuriaPay:', newUrl);
                    
                    // Criar novo objeto URL
                    if (typeof url === 'string') {
                        url = newUrl;
                    } else {
                        url = new URL(newUrl);
                    }
                }
                
                return originalFetch.call(this, url, options);
            };
            
            // Interceptar XMLHttpRequest também (caso o código use XHR)
            const originalXHROpen = XMLHttpRequest.prototype.open;
            const originalXHRSend = XMLHttpRequest.prototype.send;
            
            XMLHttpRequest.prototype.open = function(method, url, ...args) {
                let urlString = String(url || '');
                
                const isPagLoopCall = urlString.includes('api.pagloop.tech') || 
                                     urlString.includes('pagloop.tech') ||
                                     urlString.includes('/api/payments/deposit') ||
                                     urlString.toLowerCase().includes('pagloop');
                
                if (isPagLoopCall) {
                    console.log('🔄 [Interceptador Inline] BLOCANDO XHR PagLoop:', urlString);
                    url = `${PROXY_URL}/api/payments/deposit`;
                    console.log('✅ [Interceptador Inline] Redirecionando XHR para FuriaPay:', url);
                }
                
                return originalXHROpen.call(this, method, url, ...args);
            };
            
            console.log('✅ [Interceptador] Fetch e XHR interceptados!');
        })();
    </script>
